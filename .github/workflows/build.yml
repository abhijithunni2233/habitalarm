name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Fix Android colors
        run: |
          cat > android/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="splashscreen_background">#6C3CE1</color>
            <color name="colorPrimary">#6C3CE1</color>
            <color name="colorPrimaryDark">#4A2AA0</color>
            <color name="colorAccent">#8B5CF6</color>
            <color name="iconBackground">#6C3CE1</color>
          </resources>
          XMLEOF

      - name: Fix Gradle to 7.6
        run: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.4-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:7.4.2/" android/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitAlarm-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
