name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Patch expo-modules-core gradle
        run: |
          find node_modules -name "ExpoModulesCorePlugin.gradle" | while read f; do
            sed -i 's/components.release/components.getByName("release")/g' "$f" || true
          done

      - name: Fix Android colors
        run: |
          cat > android/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="splashscreen_background">#6C3CE1</color>
            <color name="colorPrimary">#6C3CE1</color>
            <color name="colorPrimaryDark">#4A2AA0</color>
            <color name="colorAccent">#8B5CF6</color>
            <color name="iconBackground">#6C3CE1</color>
          </resources>
          XMLEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache 2>&1 || \
          npx expo export:embed \
            --platform android \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res 2>&1 || true

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -x bundleReleaseJsAndAssets

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitAlarm-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
